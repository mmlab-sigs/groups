		<center><h2><a name="research"></a>Research</h2></center>
        <div class=block id="research">
			
        <script>
			var i, j;
			for (i = 0; i < researchProjects.length; i++) {
				document.write("<h3 style='border-bottom: none; margin-bottom: 8px;'>" + researchProjects[i].topic + "</h3>");
				document.write("<p>" + researchProjects[i].desc + "</p>");
				document.write("<img style=\"display:block; margin: 16px auto; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);\" src=\"" + researchProjects[i].img + "\" height=\"220\" width=\"auto\"/>");
				document.write("<p style='margin-top:16px; font-weight:600; font-size:0.9rem; color:#5a6a7a;'>Related publications:</p>");
	 			for (j = 0; j < journalPapers.length; j++) {
					if (journalPapers[j].topic == researchProjects[i].topic) {
		 				document.write("<span class=paper>");
						printPaper(journalPapers[j]);
						document.write("</span>");
					}
				}
	 			for (j = 0; j < conferencePapers.length; j++) {
					if (conferencePapers[j].topic == researchProjects[i].topic) {
		 				document.write("<span class=paper>");
						printPaper(conferencePapers[j]);
						document.write("</span>");
					}
				}
	 			for (j = 0; j < techReports.length; j++) {
					if (techReports[j].topic == researchProjects[i].topic) {
		 				document.write("<span class=paper>");
						printPaper(techReports[j]);
						document.write("</span>");
					}
				}
			}
			
        </script>
